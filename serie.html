<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>TiaFlix</title>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
color:white;
}

.navbar{
background:#111;
padding:20px;
font-size:28px;
color:#e50914;
font-weight:bold;
}

.home{
padding:30px;
}

h2{
margin-top:40px;
}

.row{
display:flex;
gap:15px;
overflow-x:auto;
}

.card img{
width:160px;
border-radius:6px;
cursor:pointer;
transition:.3s;
}

.card img:hover{
transform:scale(1.1);
}

</style>
</head>

<body>

<div class="navbar">TiaFlix</div>

<div class="home" id="home"></div>

<script src="script.js"></script>

</body>
</html>
