<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TIAFLIX</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
background:#000;
font-family:Arial;
color:white;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
padding:20px;
font-size:28px;
color:#e50914;
font-weight:bold;
background:transparent;
z-index:1000;
}

/* HERO */

.hero{
height:75vh;
background-size:cover;
background-position:center;
display:flex;
align-items:center;
padding:60px;
position:relative;
transition:1s;
}

.hero::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to top,#000,transparent);
}

.hero-content{
position:relative;
max-width:500px;
z-index:2;
}

.hero h1{
font-size:50px;
margin-bottom:10px;
}

.hero p{
color:#ddd;
margin-bottom:20px;
}

.hero button{
padding:10px 20px;
margin-right:10px;
border:none;
border-radius:4px;
cursor:pointer;
font-weight:bold;
}

.play{
background:white;
color:black;
}

.info{
background:#444;
color:white;
}

/* CONTAINER */

.container{
padding:100px 30px 30px 30px;
}

/* ROW */

.row{
display:flex;
gap:15px;
overflow-x:auto;
padding-bottom:10px;
}

.row::-webkit-scrollbar{
display:none;
}

/* CARDS */

.card img{
width:160px;
border-radius:6px;
cursor:pointer;
transition:.3s;
}

.card img:hover{
transform:scale(1.12);
}

/* PLAYER */

.player{
width:100%;
height:420px;
background:#111;
margin:30px 0;
border-radius:8px;
overflow:hidden;
}

.player iframe{
width:100%;
height:100%;
border:none;
}

/* EPISODIOS */

.episodios{
display:flex;
flex-direction:column;
gap:15px;
}

.ep{
display:flex;
gap:15px;
padding:10px;
cursor:pointer;
border-radius:6px;
}

.ep:hover{
background:#111;
}

.ep img{
width:150px;
height:90px;
object-fit:cover;
border-radius:4px;
}

/* VOLTAR */

.voltar{
margin-bottom:20px;
cursor:pointer;
color:#aaa;
}

.voltar:hover{
color:white;
}

</style>
</head>

<body>

<div class="navbar">TIAFLIX</div>

<div class="container" id="app"></div>

<script>

const series=[

{
id:"DAN DA DAN",
titulo:"DAN DA DAN",
categoria:"Animes",
descricao:"Adolescentes enfrentam alienígenas e espíritos em batalhas caóticas e sobrenaturais.",
capa:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTyjuB28SMQ1dhK8yvhBjz5IaPj2D4LS-9G-LXf_C0pOg&s=10",
episodios:[
{
video:"1X7i-UP2RUG-pBepsFrOTKyF9ZbPhse0U",
thumb:"img/naruto-ep1.jpg"
},

{
video:"1DEF456",
thumb:"img/naruto-ep2.jpg"
},

{
video:"1GHI789",
thumb:"img/naruto-ep3.jpg"
}

]

},

{
id:"witcher",
titulo:"The Witcher",
categoria:"Ação",
descricao:"Um caçador de monstros em um mundo cheio de magia.",
capa:"https://image.tmdb.org/t/p/original/zrPpUlehQaBf8YX2NrVrKK8IEpf.jpg",

episodios:[

{
video:"1DDD444",
thumb:"img/witcher-ep1.jpg"
},

{
video:"1EEE555",
thumb:"img/witcher-ep2.jpg"
}

]

}

]

const app=document.getElementById("app")

/* HOME */

function home(){

app.innerHTML=`

<div class="hero" id="hero">

<div class="hero-content">

<h1 id="heroTitle"></h1>

<p id="heroDesc"></p>

<button class="play" id="heroPlay">▶ Assistir</button>

<button class="info" id="heroInfo">Mais informações</button>

</div>

</div>

`

const hero=document.getElementById("hero")
const heroTitle=document.getElementById("heroTitle")
const heroDesc=document.getElementById("heroDesc")
const heroPlay=document.getElementById("heroPlay")
const heroInfo=document.getElementById("heroInfo")

function trocarBanner(){

const destaque=series[Math.floor(Math.random()*series.length)]

hero.style.backgroundImage=`url('${destaque.capa}')`

heroTitle.innerText=destaque.titulo
heroDesc.innerText=destaque.descricao

heroPlay.onclick=()=>abrirSerie(destaque.id)
heroInfo.onclick=()=>abrirSerie(destaque.id)

}

trocarBanner()

setInterval(trocarBanner,10000)

/* CATEGORIAS */

const categorias={}

series.forEach(s=>{

if(!categorias[s.categoria]){
categorias[s.categoria]=[]
}

categorias[s.categoria].push(s)

})

Object.keys(categorias).forEach(cat=>{

const h=document.createElement("h2")
h.innerText=cat

const row=document.createElement("div")
row.className="row"

categorias[cat].forEach(s=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`<img src="${s.capa}">`

card.onclick=()=>abrirSerie(s.id)

row.appendChild(card)

})

app.appendChild(h)
app.appendChild(row)

})

}

/* ABRIR SERIE */

function abrirSerie(id){

const serie=series.find(s=>s.id===id)

app.innerHTML=`

<div class="voltar" onclick="home()">⬅ Voltar</div>

<h1>${serie.titulo}</h1>

<div class="player">
<iframe id="player"></iframe>
</div>

<div class="episodios" id="episodios"></div>

`

const lista=document.getElementById("episodios")

serie.episodios.forEach((ep,i)=>{

const div=document.createElement("div")

div.className="ep"

div.innerHTML=`

<img src="${ep.thumb}">

<div>
<h3>Episódio ${i+1}</h3>
</div>

`

div.onclick=()=>{

document.getElementById("player").src=
`https://drive.google.com/file/d/${ep.video}/preview`

}

lista.appendChild(div)

})

document.getElementById("player").src=
`https://drive.google.com/file/d/${serie.episodios[0].video}/preview`

}

/* START */

home()

</script>

</body>
</html>
