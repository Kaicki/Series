<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TiaFlix</title>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
color:white;
}

.navbar{
background:#111;
padding:20px;
font-size:28px;
color:#e50914;
font-weight:bold;
}

.container{
padding:30px;
}

.row{
display:flex;
gap:15px;
overflow-x:auto;
}

.card img{
width:160px;
border-radius:6px;
cursor:pointer;
transition:.3s;
}

.card img:hover{
transform:scale(1.1);
}

.player{
width:100%;
height:420px;
background:#111;
margin:30px 0;
}

.player iframe{
width:100%;
height:100%;
border:none;
}

.episodios{
display:flex;
flex-direction:column;
gap:15px;
}

.ep{
display:flex;
gap:15px;
padding:10px;
cursor:pointer;
border-radius:6px;
}

.ep:hover{
background:#111;
}

.ep img{
width:150px;
height:90px;
object-fit:cover;
border-radius:4px;
}

.voltar{
margin-bottom:20px;
cursor:pointer;
color:#aaa;
}

</style>
</head>

<body>

<div class="navbar">TiaFlix</div>

<div class="container" id="app"></div>

<script>

/* =======================
CONST PROFISSIONAL
======================= */

const series = [

{
id:"naruto",
titulo:"Naruto",
categoria:"Animes",
capa:"https://image.tmdb.org/t/p/w500/xC9q7jHnR7o9p8pXQ8Z9q4CPGK.jpg",

episodios:[
"1ABC123",
"1DEF456",
"1GHI789"
]

},

{
id:"attack",
titulo:"Attack on Titan",
categoria:"Animes",
capa:"https://image.tmdb.org/t/p/w500/hTP1DtLGFamjfu8WqjnuQdP1n4i.jpg",

episodios:[
"1AAA111",
"1BBB222",
"1CCC333"
]

},

{
id:"witcher",
titulo:"The Witcher",
categoria:"Ação",
capa:"https://image.tmdb.org/t/p/w500/zrPpUlehQaBf8YX2NrVrKK8IEpf.jpg",

episodios:[
"1DDD444",
"1EEE555"
]

}

]

const app = document.getElementById("app")

/* =======================
HOME
======================= */

function home(){

app.innerHTML=""

const categorias={}

series.forEach(s=>{

if(!categorias[s.categoria]){
categorias[s.categoria]=[]
}

categorias[s.categoria].push(s)

})

Object.keys(categorias).forEach(cat=>{

const h=document.createElement("h2")
h.innerText=cat

const row=document.createElement("div")
row.className="row"

categorias[cat].forEach(s=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`<img src="${s.capa}">`

card.onclick=()=>abrirSerie(s.id)

row.appendChild(card)

})

app.appendChild(h)
app.appendChild(row)

})

}

/* =======================
ABRIR SÉRIE
======================= */

function abrirSerie(id){

const serie = series.find(s=>s.id===id)

app.innerHTML=`

<div class="voltar" onclick="home()">⬅ Voltar</div>

<h1>${serie.titulo}</h1>

<div class="player">
<iframe id="player"></iframe>
</div>

<div class="episodios" id="episodios"></div>

`

const lista = document.getElementById("episodios")

serie.episodios.forEach((ep,i)=>{

const div=document.createElement("div")

div.className="ep"

div.innerHTML=`

<img src="https://picsum.photos/300/170?random=${i}">

<div>
<h3>Episódio ${i+1}</h3>
</div>

`

div.onclick=()=>{

document.getElementById("player").src=
`https://drive.google.com/file/d/${ep}/preview`

}

lista.appendChild(div)

})

document.getElementById("player").src=
`https://drive.google.com/file/d/${serie.episodios[0]}/preview`

}

/* =======================
START
======================= */

home()

</script>

</body>
</html>
