
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TIAFLIX</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background:#000;
font-family:Arial;
color:white;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
padding:15px;
font-size:22px;
color:#e50914;
font-weight:bold;
background:transparent;
z-index:1000;
}

/* HERO */

.hero{
height:45vh;
background-size:cover;
background-position:center;
display:flex;
align-items:center;
padding:30px;
position:relative;
transition:1s;
}

.hero::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to top,#000,transparent);
}

.hero-content{
position:relative;
max-width:300px;
z-index:2;
}

.hero h1{
font-size:22px;
margin-bottom:8px;
}

.hero p{
font-size:14px;
color:#ddd;
margin-bottom:15px;
}

.hero button{
padding:8px 14px;
margin-right:8px;
border:none;
border-radius:4px;
cursor:pointer;
font-weight:bold;
}

.play{
background:white;
color:black;
}

.info{
background:#444;
color:white;
}

/* CONTAINER */

.container{
padding:80px 20px 20px 20px;
}

/* ROW */

.row{
display:flex;
gap:10px;
overflow-x:auto;
padding-bottom:10px;
}

.row::-webkit-scrollbar{
display:none;
}

/* CARDS */

.card img{
width:130px;
border-radius:6px;
cursor:pointer;
transition:.3s;
}

.card img:hover{
transform:scale(1.1);
}

/* PLAYER */

.player{
width:100%;
height:300px;
background:#111;
margin:20px 0;
border-radius:8px;
overflow:hidden;
}

.player iframe{
width:100%;
height:100%;
border:none;
}

/* EPISODIOS */

.episodios{
display:flex;
flex-direction:column;
gap:10px;
}

.ep{
display:flex;
gap:10px;
padding:8px;
cursor:pointer;
border-radius:6px;
}

.ep:hover{
background:#111;
}

.ep img{
width:120px;
height:70px;
object-fit:cover;
border-radius:4px;
}

/* VOLTAR */

.voltar{
margin-bottom:15px;
cursor:pointer;
color:#aaa;
font-size:14px;
}

.voltar:hover{
color:white;
}

select{
margin-bottom:10px;
padding:5px;
background:#111;
color:white;
border:none;
border-radius:4px;
}

</style>
</head>

<body>

<div class="navbar">TIAFLIX</div>

<div class="container" id="app"></div>

<script>

const series=[

{
id:"dandadan",
titulo:"DAN DA DAN",
categoria:"Animes",
descricao:"Adolescentes enfrentam alienígenas e espíritos.",
capa:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTyjuB28SMQ1dhK8yvhBjz5IaPj2D4LS-9G-LXf_C0pOg&s=10",

temporadas:[

{
nome:"Temporada 1",

episodios:[

{video:"1X7i-UP2RUG-pBepsFrOTKyF9ZbPhse0U",
thumb:"https://picsum.photos/300/170?1"},

{video:"1DEF456",
thumb:"https://picsum.photos/300/170?2"}

]

},

{nome:"Temporada 2",
episodios:[
{video:"1GHI789",
thumb:"https://picsum.photos/300/170?3"}
]
}
]
},
  {
id:"one piece",
titulo:"ONE PIECE",
categoria:"Live action",
descricao:"O pirata Monkey D. Luffy e sua tripulação exploram um mundo fantástico de oceanos infinitos e ilhas exóticas em busca do maior tesouro do mundo.",
capa:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQVLHIfitRT_TdxsK3ibPB85hXbMJGYM4PyLDTq_R18J_Rej4_V ",

temporadas:[

{
nome:"Temporada 1",

episodios:[

{video:"1X7i-UP2RUG-pBepsFrOTKyF9ZbPhse0U",
thumb:"https://picsum.photos/300/170?1"},

{video:"1DEF456",
thumb:"https://picsum.photos/300/170?2"}

]

},

{nome:"Temporada 2",
episodios:[
{video:"12SZc4gAb7gATQkUCcCPcHrqsQEwIhhgh",
thumb:"https://picsum.photos/300/170?3"}
{video:"1t_3cH0jm4-_ptk0IX6qHJKIal1D67m6",
thumb:"https://picsum.photos/300/170?3"}
{video:"18XyeM2nVGQTpG5ma2JAIyhlIEFRc4Nf_",
thumb:"https://picsum.photos/300/170?3"}
{video:"1nT_eZfeTR0yXvXzWiFitDbA4mPh_AmGj",
thumb:"https://picsum.photos/300/170?3"}
]
}
]
  }
  
]

const app=document.getElementById("app")
function home(){
app.innerHTML=`
<div class="hero" id="hero">
<div class="hero-content">
<h1 id="heroTitle"></h1>
<p id="heroDesc"></p>
<button class="play" id="heroPlay">▶ Assistir</button>
<button class="info" id="heroInfo">Mais informações</button>
</div>
</div>
`
const hero=document.getElementById("hero")
const heroTitle=document.getElementById("heroTitle")
const heroDesc=document.getElementById("heroDesc")
const heroPlay=document.getElementById("heroPlay")
const heroInfo=document.getElementById("heroInfo")
function trocarBanner(){
const destaque=series[Math.floor(Math.random()*series.length)]
hero.style.backgroundImage=`url('${destaque.capa}')`

heroTitle.innerText=destaque.titulo
heroDesc.innerText=destaque.descricao

heroPlay.onclick=()=>abrirSerie(destaque.id)
heroInfo.onclick=()=>abrirSerie(destaque.id)

}

trocarBanner()

setInterval(trocarBanner,10000)

/* CATEGORIAS */

const categorias={}

series.forEach(s=>{

if(!categorias[s.categoria]){
categorias[s.categoria]=[]
}

categorias[s.categoria].push(s)

})

Object.keys(categorias).forEach(cat=>{

const h=document.createElement("h2")
h.innerText=cat

const row=document.createElement("div")
row.className="row"

categorias[cat].forEach(s=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`<img src="${s.capa}">`

card.onclick=()=>abrirSerie(s.id)

row.appendChild(card)

})

app.appendChild(h)
app.appendChild(row)

})

}

/* ABRIR SERIE */

function abrirSerie(id){

const serie=series.find(s=>s.id===id)

app.innerHTML=`

<div class="voltar" onclick="home()">⬅ Voltar</div>

<h1>${serie.titulo}</h1>

<div class="player">
<iframe id="player" allowfullscreen allow="fullscreen"></iframe>
</div>

<select id="temporada"></select>

<div class="episodios" id="episodios"></div>

`

const lista=document.getElementById("episodios")
const select=document.getElementById("temporada")

serie.temporadas.forEach((t,i)=>{

const opt=document.createElement("option")

opt.value=i
opt.innerText=t.nome

select.appendChild(opt)

})

function carregar(temp){

lista.innerHTML=""

const temporada=serie.temporadas[temp]

temporada.episodios.forEach((ep,i)=>{

const div=document.createElement("div")

div.className="ep"

div.innerHTML=`

<img src="${ep.thumb}">

<div>
<h3>Episódio ${i+1}</h3>
</div>

`

div.onclick=()=>{

document.getElementById("player").src=
`https://drive.google.com/file/d/${ep.video}/preview`

}

lista.appendChild(div)

})

document.getElementById("player").src=
`https://drive.google.com/file/d/${temporada.episodios[0].video}/preview`

}

select.onchange=()=>carregar(select.value)

carregar(0)

}

home()

</script>

</body>
</html>
